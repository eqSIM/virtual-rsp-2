name: Deploy Docs

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'  # Change to your docsify folder path

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs  # Change to your docsify folder path