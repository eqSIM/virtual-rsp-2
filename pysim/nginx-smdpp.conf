# nginx configuration for osmo-smdpp TLS proxy
# Run from pySim directory: nginx -c $PWD/nginx-smdpp.conf -p $PWD

daemon off;
pid nginx-smdpp.pid;
error_log nginx-error.log info;

events {
    worker_connections 128;
}

http {
    access_log nginx-access.log;
    
    upstream smdpp {
        server 127.0.0.1:8000;
    }
    
    server {
        listen 8443 ssl;
        server_name testsmdpplus1.example.com localhost;
        
        # SGP.26 test certificates
        ssl_certificate     smdpp-data/generated/DPtls/CERT_S_SM_DP_TLS_NIST.pem;
        ssl_certificate_key smdpp-data/generated/DPtls/SK_S_SM_DP_TLS_NIST.pem;
        
        # TLS configuration for GSMA eSIM
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384;
        ssl_prefer_server_ciphers on;
        
        # Proxy to osmo-smdpp
        location / {
            proxy_pass http://smdpp/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 600s;
            proxy_buffering off;
        }
    }
}

