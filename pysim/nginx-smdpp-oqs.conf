# nginx configuration for SM-DP+ with OQS-enabled hybrid TLS
# Uses both classical and post-quantum cryptography

daemon off;
worker_processes 1;
error_log /tmp/nginx-oqs-error.log warn;
pid /tmp/nginx-oqs.pid;

events {
    worker_connections 1024;
}

http {
    access_log /tmp/nginx-oqs-access.log;
    client_body_temp_path /tmp/nginx-oqs-client-body;
    proxy_temp_path /tmp/nginx-oqs-proxy;
    fastcgi_temp_path /tmp/nginx-oqs-fastcgi;
    uwsgi_temp_path /tmp/nginx-oqs-uwsgi;
    scgi_temp_path /tmp/nginx-oqs-scgi;

    # Hybrid TLS configuration
    # Uses both classical and PQC algorithms
    server {
        listen 8443 ssl http2;
        server_name testsmdpplus1.example.com;

        # SSL Certificate (Classical)
        ssl_certificate certs-oqs-tls/server-ecdsa.crt;
        ssl_certificate_key certs-oqs-tls/server-ecdsa.key;

        # SSL Protocols and Ciphers
        ssl_protocols TLSv1.2 TLSv1.3;
        
        # Classical cipher suites
        ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256';
        ssl_prefer_server_ciphers on;

        # TLS 1.3 ciphersuites (when OQS-OpenSSL is available, these will be hybrid)
        # Format: TLS_<classical>_WITH_<pqc>_<cipher>
        # For now, using standard ciphers until OQS-OpenSSL provider is configured
        ssl_conf_command Ciphersuites TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256;

        # Enable session resumption for performance
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # OCSP stapling (disabled for self-signed certs)
        ssl_stapling off;
        ssl_stapling_verify off;

        # Custom headers to indicate PQC support
        add_header X-PQC-Enabled "true" always;
        add_header X-PQC-Algorithms "ML-KEM-768,ML-DSA-87" always;
        add_header X-Hybrid-Mode "ECDH+ML-KEM,ECDSA+ML-DSA" always;
        add_header Strict-Transport-Security "max-age=31536000" always;

        # Proxy to SM-DP+ backend
        location / {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            
            # Pass PQC information to backend
            proxy_set_header X-PQC-Session "true";
            
            # Larger buffers for PQC data (ML-DSA signatures are ~4KB)
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 32k;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK - Hybrid PQC TLS Active\n";
            add_header Content-Type text/plain;
        }
    }
}


